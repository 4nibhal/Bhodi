name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Release Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.11"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Run test suite
        run: uv run pytest

      - name: Run eval suite explicitly
        run: uv run pytest tests/evals

      - name: Verify source compilation
        run: uv run python -m compileall src tests

      - name: Build distribution artifacts
        run: |
          rm -rf build dist
          uv build

      - name: Smoke test built wheel
        shell: bash
        run: |
          smoke_dir="$RUNNER_TEMP/package-smoke"
          uv venv "$smoke_dir" --python 3.11
          uv pip install --python "$smoke_dir/bin/python" dist/*.whl
          "$smoke_dir/bin/python" - <<'PY'
          import importlib.metadata as metadata

          expected = {"bhodi", "bhodi-api", "bhodi-index"}
          discovered = {
              entry_point.name
              for entry_point in metadata.entry_points(group="console_scripts")
          }
          missing = expected - discovered
          if missing:
              raise SystemExit(f"Missing console scripts: {sorted(missing)}")

          import bhodi_platform.interfaces.api.app
          import indexer.cli
          PY
          "$smoke_dir/bin/bhodi-index" --help

      - name: Show test summary
        run: uv run pytest --tb=short -q
