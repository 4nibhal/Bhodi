name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.10.11"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@c7f87aa956e4c323abf06d5dec078e358f6b4d04  # v6.0.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Run full test suite (includes tests/evals)
        run: uv run pytest

      - name: Verify source compilation
        run: uv run python -m compileall src tests

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - test

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@c7f87aa956e4c323abf06d5dec078e358f6b4d04  # v6.0.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Build distribution artifacts
        run: |
          rm -rf build dist
          uv build

      - name: Smoke test built wheel
        shell: bash
        run: |
          set -euo pipefail
          smoke_dir="$RUNNER_TEMP/package-smoke"
          uv venv "$smoke_dir" --python "${{ env.PYTHON_VERSION }}"
          uv pip install --python "$smoke_dir/bin/python" dist/*.whl
          "$smoke_dir/bin/python" - <<'PY'
          import importlib.metadata as metadata

          expected = {"bhodi", "bhodi-api", "bhodi-index"}
          discovered = {
              entry_point.name
              for entry_point in metadata.entry_points(group="console_scripts")
          }
          missing = expected - discovered
          if missing:
              raise SystemExit(f"Missing console scripts: {sorted(missing)}")

          import bhodi_platform.interfaces.api.app
          print("All checks passed")
          PY
          "$smoke_dir/bin/bhodi-index" --help

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - test

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@c7f87aa956e4c323abf06d5dec078e358f6b4d04  # v6.0.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Export resolved dependencies for audit
        run: uv export --no-emit-project -o /tmp/audit-requirements.txt

      - name: Security audit (pip-audit)
        run: uv run --with pip-audit pip-audit -r /tmp/audit-requirements.txt --strict --disable-pip

      - name: Security scan (bandit)
        run: uv run --with bandit bandit -r src/

  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - test

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@c7f87aa956e4c323abf06d5dec078e358f6b4d04  # v6.0.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Quality ratchet
        run: uv run python scripts/quality_ratchet.py --baseline .github/quality-baseline.json
