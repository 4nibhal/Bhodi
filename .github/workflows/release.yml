name: Release Artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@c7f87aa956e4c323abf06d5dec078e358f6b4d04  # v6.0.0
        with:
          version: "0.10.11"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Run release contract checks
        run: uv run pytest

      - name: Build release artifacts
        run: |
          rm -rf build dist
          uv build

      - name: Smoke test built wheel
        shell: bash
        run: |
          set -euo pipefail
          smoke_dir="$RUNNER_TEMP/package-smoke"
          uv venv "$smoke_dir" --python 3.11
          uv pip install --python "$smoke_dir/bin/python" dist/*.whl
          "$smoke_dir/bin/python" - <<'PY'
          import importlib.metadata as metadata

          expected = {"bhodi", "bhodi-api", "bhodi-index"}
          discovered = {
              entry_point.name
              for entry_point in metadata.entry_points(group="console_scripts")
          }
          missing = expected - discovered
          if missing:
              raise SystemExit(f"Missing console scripts: {sorted(missing)}")

          import bhodi_platform.interfaces.api.app
          import indexer.cli
          print("All checks passed")
          PY
          "$smoke_dir/bin/bhodi-index" --help

      - name: Publish artifacts to GitHub release
        uses: softprops/action-gh-release@01570a1f39cb168c169c802c3bceb9e93fb10974  # v2.1.0
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
          generate_release_notes: true
